server {
    listen 80;
    server_name sauvagel.xyz;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # L'HTML référence des assets hashés : ne pas le mettre en cache long
        # pour que les nouveaux déploiements soient pris immédiatement.
        add_header Cache-Control "no-cache";
    }

    # Assets fingerprintés par SvelteKit (_app/immutable/*) : cache agressif.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sert directement les .gz pré-générés au build (precompress) sans
    # recompresser à chaque requête. gzip on reste le fallback dynamique.
    gzip_static on;
    gzip_vary on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}
