services:
  app:
    build: .
    volumes:
      - build:/app/build

  nginx:
    image: nginx:alpine
    container_name: sauvagel-nginx
    volumes:
      - build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web
    depends_on:
      app:
        condition: service_completed_successfully
    restart: unless-stopped

networks:
  web:
    external: true
    name: web

volumes:
  build:
